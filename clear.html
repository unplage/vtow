<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA 缓存清理工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #4CAF50;
            --warning: #FF9800;
            --error: #f44336;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #333333;
            --text-secondary: #666666;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #e4e8ec 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; padding: 40px 20px; }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .path-display {
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .path-display .label {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-item {
            text-align: center;
            padding: 16px 8px;
            background: var(--bg);
            border-radius: 12px;
        }
        .stat-item .number { font-size: 24px; font-weight: 700; color: var(--primary); }
        .log-container {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            color: #fff;
            margin-bottom: 20px;
            display: none;
        }
        .log-item { padding: 4px 0; border-bottom: 1px solid #333; }
        .log-success { color: #4CAF50; }
        .log-skip { color: #9E9E9E; }
        .btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        .btn-success { background: var(--success); color: white; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧹 PWA 缓存清理工具</h1>
            <p>只清理当前 PWA，不影响其他项目</p>
        </div>

        <div class="card">
            <div class="path-display">
                <div class="label">当前 PWA</div>
                <div id="pwaName" style="font-weight:600;color:var(--primary);">检测中...</div>
                <div class="label" style="margin-top:8px;">当前路径</div>
                <div id="currentPath">检测中...</div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="number" id="stat-sw">-</div>
                    <div class="label">Service Worker</div>
                </div>
                <div class="stat-item">
                    <div class="number" id="stat-cache">-</div>
                    <div class="label">缓存</div>
                </div>
                <div class="stat-item">
                    <div class="number" id="stat-storage">-</div>
                    <div class="label">存储项</div>
                </div>
            </div>

            <div class="log-container" id="logContainer"></div>

            <button class="btn btn-primary" id="clearBtn" onclick="startClear()">开始清理</button>
            <button class="btn btn-success" id="backBtn" onclick="goBack()" style="display:none;">✓ 返回 PWA</button>
        </div>
    </div>

    <script>
    // ==================== 配置区域 ====================
    // 每个 PWA 只需要修改这里
    
    const CONFIG = {
        // 可选：添加当前 PWA 特有的额外关键词
        // 不要在这里添加其他 PWA 的关键词！
        CUSTOM_KEYWORDS: [],
        
        // 严格模式：true = 更安全，只清理明确匹配的数据
        STRICT_MODE: true,
        
        // 是否包含通用 PWA 关键词
        INCLUDE_BUILTIN: true
    };

    // ==================== 核心代码 ====================

    // 自动提取 PWA 信息
    const URL_INFO = new URL(location.href);
    const CURRENT_PATH = URL_INFO.pathname;
    const PATH_SEGMENTS = CURRENT_PATH.split('/').filter(s => s);
    const PWA_NAME = PATH_SEGMENTS[0] || 'unknown';
    const CURRENT_DIR = '/' + PATH_SEGMENTS.slice(0, -1).join('/') + '/';

    // 显示信息
    document.getElementById('pwaName').textContent = PWA_NAME;
    document.getElementById('currentPath').textContent = CURRENT_DIR;

    // 生成自动关键词
    function generateKeywords(name) {
        const keywords = [name];
        const variations = [
            name.toLowerCase(),
            name.toUpperCase(),
            name.replace(/-/g, ''),
            name.replace(/_/g, ''),
        ];
        variations.forEach(v => { if (!keywords.includes(v)) keywords.push(v); });
        
        // 常见组合
        keywords.push(name + 'DB', name + 'Cache', name + 'Storage', name + 'App');
        return [...new Set(keywords)];
    }

    // 内置通用关键词（不包含任何特定应用）
    const BUILTIN_KEYWORDS = [
        'app_', 'pwa_', 'sw_', 'service-worker', 'workbox',
        'version', 'build', 'deploy', 'cache_', 'storage_'
    ];

    const ALL_KEYWORDS = [
        ...generateKeywords(PWA_NAME),
        ...(CONFIG.INCLUDE_BUILTIN ? BUILTIN_KEYWORDS : []),
        ...CONFIG.CUSTOM_KEYWORDS
    ];

    function log(msg, type = 'info') {
        const container = document.getElementById('logContainer');
        container.style.display = 'block';
        const div = document.createElement('div');
        div.className = `log-item log-${type}`;
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function isMatch(text) {
        if (!text) return false;
        
        // 严格模式：优先路径匹配
        if (CONFIG.STRICT_MODE) {
            return text.includes(CURRENT_DIR) || text.includes('/' + PWA_NAME + '/');
        }
        
        // 关键词匹配
        return ALL_KEYWORDS.some(k => text.toLowerCase().includes(k.toLowerCase()));
    }

    async function startClear() {
        const btn = document.getElementById('clearBtn');
        btn.disabled = true;
        btn.textContent = '清理中...';
        
        log(`开始清理: ${PWA_NAME}`, 'info');
        
        try {
            // 1. Service Worker
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (const reg of regs) {
                    const scope = reg.scope || '';
                    if (scope.includes(PWA_NAME) || scope.includes(CURRENT_DIR)) {
                        await reg.unregister();
                        log(`✓ 注销 SW: ${scope}`, 'success');
                    }
                }
            }
            
            // 2. Cache
            if ('caches' in window) {
                const keys = await caches.keys();
                for (const key of keys) {
                    if (isMatch(key)) {
                        await caches.delete(key);
                        log(`✓ 删除缓存: ${key}`, 'success');
                    }
                }
            }
            
            // 3. IndexedDB
            try {
                const dbs = await indexedDB.databases?.() || [];
                for (const db of dbs) {
                    if (isMatch(db.name)) {
                        indexedDB.deleteDatabase(db.name);
                        log(`✓ 删除数据库: ${db.name}`, 'success');
                    }
                }
            } catch(e) {}
            
            // 4. localStorage
            for (let i = localStorage.length - 1; i >= 0; i--) {
                const key = localStorage.key(i);
                if (key && isMatch(key)) {
                    localStorage.removeItem(key);
                    log(`✓ 删除: ${key}`, 'success');
                }
            }
            
            sessionStorage.clear();
            
            log('✅ 清理完成', 'success');
            btn.style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            
        } catch (err) {
            log(`错误: ${err.message}`, 'error');
            btn.disabled = false;
            btn.textContent = '重试';
        }
    }

    function goBack() {
        location.href = CURRENT_DIR + 'index.html?_=' + Date.now();
    }

    // 预检测
    async function preCheck() {
        let sw = 0, cache = 0, storage = 0;
        
        if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            sw = regs.filter(r => (r.scope || '').includes(PWA_NAME)).length;
        }
        
        if ('caches' in window) {
            const keys = await caches.keys();
            cache = keys.filter(k => isMatch(k)).length;
        }
        
        for (let i = 0; i < localStorage.length; i++) {
            if (isMatch(localStorage.key(i))) storage++;
        }
        
        document.getElementById('stat-sw').textContent = sw;
        document.getElementById('stat-cache').textContent = cache;
        document.getElementById('stat-storage').textContent = storage;
    }

    window.addEventListener('load', preCheck);
    </script>
</body>
</html>
