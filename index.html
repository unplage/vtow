<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VoiceScribe Local - 纯本地高性能语音转写</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #3b82f6;
            --accent: #8b5cf6;
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --surface-light: #2a2a2a;
            --surface-hover: #333;
            --text: #fafafa;
            --text-secondary: #a3a3a3;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: #333;
            --gradient: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
            max-width: 100%;
        }

        .header {
            padding: 12px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: var(--gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .brand-text h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand-text .tag {
            font-size: 10px;
            color: var(--primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-pill {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .status-pill.ready { color: var(--success); border-color: var(--success); }
        .status-pill.recording { 
            color: var(--error); 
            border-color: var(--error);
            animation: pulse-border 2s infinite;
        }
        .status-pill.processing { color: var(--warning); border-color: var(--warning); }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0); }
        }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .lang-select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .lang-select:focus {
            border-color: var(--primary);
        }

        .record-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .record-btn:active {
            transform: scale(0.95);
        }

        .record-btn .btn-bg {
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: var(--gradient);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .record-btn.recording .btn-bg {
            opacity: 1;
            animation: recording-pulse 1.5s infinite;
        }

        @keyframes recording-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .record-btn svg {
            width: 28px;
            height: 28px;
            position: relative;
            z-index: 1;
            transition: all 0.3s;
        }

        .record-btn.recording svg {
            color: white;
            transform: scale(0.8);
        }

        .secondary-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }

        .icon-btn:hover:not(:disabled) {
            background: var(--surface-light);
            color: var(--text);
            border-color: var(--primary);
        }

        .icon-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .icon-btn svg {
            width: 18px;
            height: 18px;
        }

        .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background: var(--error);
            border-radius: 50%;
            display: none;
        }

        .icon-btn.has-content .badge {
            display: block;
        }

        .visualizer-panel {
            height: 60px;
            background: var(--surface);
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .visualizer-canvas {
            width: 100%;
            height: 100%;
        }

        .visualizer-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .time-display {
            font-family: 'SF Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .visualizer-panel.recording .time-display {
            opacity: 1;
        }

        .transcript-container {
            flex: 1;
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .transcript-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
        }

        .transcript-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .transcript-stats {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
        }

        .transcript-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-size: 17px;
            line-height: 1.7;
            scroll-behavior: smooth;
        }

        .transcript-content::-webkit-scrollbar {
            width: 6px;
        }

        .transcript-content::-webkit-scrollbar-thumb {
            background: var(--surface-light);
            border-radius: 3px;
        }

        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--surface-light);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .segment {
            margin-bottom: 16px;
            animation: slideIn 0.3s ease;
            position: relative;
            padding-left: 16px;
            border-left: 3px solid var(--primary);
            background: rgba(16, 185, 129, 0.05);
            padding: 12px 16px;
            border-radius: 0 12px 12px 0;
        }

        .segment.interim {
            border-left-color: var(--warning);
            background: rgba(245, 158, 11, 0.05);
            opacity: 0.9;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .segment-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-family: monospace;
        }

        .segment-text {
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--primary);
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .bottom-bar {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .tool-btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tool-btn:hover:not(:disabled) {
            background: var(--surface-light);
            color: var(--text);
        }

        .tool-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .tool-btn svg {
            width: 16px;
            height: 16px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            width: 100%;
            max-height: 80vh;
            border-radius: 24px 24px 0 0;
            border: 1px solid var(--border);
            border-bottom: none;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--surface-light);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .recording-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .recording-item:hover {
            border-color: var(--primary);
            background: var(--surface-light);
        }

        .recording-icon {
            width: 48px;
            height: 48px;
            background: var(--surface-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .recording-info {
            flex: 1;
        }

        .recording-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .recording-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
        }

        .recording-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: var(--surface-light);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--primary);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--surface);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--error); color: var(--error); }

        .setting-item {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .setting-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: block;
        }

        .setting-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .option-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .debug-panel {
            position: fixed;
            bottom: 100px;
            left: 16px;
            right: 16px;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            font-size: 11px;
            font-family: monospace;
            color: var(--text-secondary);
            z-index: 50;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }

        .debug-panel.show {
            display: block;
        }

        .debug-line {
            margin-bottom: 4px;
        }

        .debug-line.error { color: var(--error); }
        .debug-line.success { color: var(--success); }
        .debug-line.info { color: var(--primary); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="brand">
                <div class="logo">🎙️</div>
                <div class="brand-text">
                    <h1>VoiceScribe Local</h1>
                    <div class="tag">
                        <span>●</span>
                        <span>纯本地处理 · 零网络依赖</span>
                    </div>
                </div>
            </div>
            <div class="status-pill ready" id="statusPill">
                <span>●</span>
                <span id="statusText">就绪</span>
            </div>
        </header>

        <div class="control-panel">
            <select class="lang-select" id="langSelect" onchange="changeLanguage(this.value)">
                <option value="zh-CN">🇨🇳 普通话</option>
                <option value="en-US">🇺🇸 English</option>
                <option value="zh-CN,en-US">🌐 中英混合</option>
                <option value="yue-HK">🇭🇰 粤语</option>
                <option value="ja-JP">🇯🇵 日语</option>
            </select>

            <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
                <div class="btn-bg"></div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>

            <div class="secondary-actions">
                <button class="icon-btn" id="historyBtn" onclick="showHistory()" title="历史记录">
                    <div class="badge"></div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5"></path>
                        <path d="M8.5 8.5v.01"></path>
                        <path d="M16 15.5v.01"></path>
                        <path d="M12 12v.01"></path>
                        <path d="M11 17v.01"></path>
                        <path d="M7 14v.01"></path>
                    </svg>
                </button>
                <button class="icon-btn" onclick="showSettings()" title="设置">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
                <button class="icon-btn" onclick="toggleDebug()" title="调试">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="visualizer-panel" id="visualizerPanel">
            <canvas class="visualizer-canvas" id="visualizer"></canvas>
            <div class="visualizer-overlay">
                <div class="time-display" id="timeDisplay">00:00</div>
            </div>
        </div>

        <div class="transcript-container">
            <div class="transcript-header">
                <div class="transcript-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    实时转写
                </div>
                <div class="transcript-stats">
                    <span id="wordCount">0 字</span>
                    <span id="segCount">0 段</span>
                </div>
            </div>
            <div class="transcript-content" id="transcriptContent">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🎤</div>
                    <div style="font-size: 16px; font-weight: 600; margin-bottom: 8px;">准备就绪</div>
                    <div style="font-size: 13px; opacity: 0.7; line-height: 1.6;">
                        点击麦克风开始录音<br>
                        使用浏览器内置语音识别引擎
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <button class="tool-btn" id="copyBtn" onclick="copyText()" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                复制
            </button>
            <button class="tool-btn" id="exportBtn" onclick="exportText()" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                导出
            </button>
            <button class="tool-btn" onclick="clearAll()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                清空
            </button>
        </div>
    </div>

    <!-- 历史记录模态框 -->
    <div class="modal" id="historyModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">📚 历史记录</div>
                <button class="close-btn" onclick="closeHistory()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="historyList">
                <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                    暂无历史记录
                </div>
            </div>
        </div>
    </div>

    <!-- 设置模态框 -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">⚙️ 设置</div>
                <button class="close-btn" onclick="closeSettings()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label class="setting-label">识别引擎</label>
                    <div class="setting-options">
                        <button class="option-btn active" onclick="setEngine('webspeech', this)">🌐 Web Speech</button>
                        <button class="option-btn" onclick="setEngine('whisper', this)" disabled>🧠 Whisper (WASM)</button>
                    </div>
                    <div style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">
                        Web Speech: 使用浏览器内置引擎，需要网络连接<br>
                        Whisper: 纯本地运行，无需网络（开发中）
                    </div>
                </div>
                
                <div class="setting-item">
                    <label class="setting-label">自动保存</label>
                    <div class="setting-options">
                        <button class="option-btn active" onclick="setAutoSave(true, this)">开启</button>
                        <button class="option-btn" onclick="setAutoSave(false, this)">关闭</button>
                    </div>
                </div>

                <div class="setting-item">
                    <label class="setting-label">音频质量</label>
                    <div class="setting-options">
                        <button class="option-btn" onclick="setQuality('low', this)">省空间</button>
                        <button class="option-btn active" onclick="setQuality('high', this)">高质量</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="debug-panel" id="debugPanel"></div>

    <script>
        // ==================== 修复后的语音识别引擎 ====================
        
        class FixedSpeechRecognizer {
            constructor() {
                this.recognition = null;
                this.isRecording = false;
                this.currentLang = 'zh-CN';
                this.segments = [];
                this.currentSegment = null;
                this.audioChunks = [];
                this.mediaRecorder = null;
                this.stream = null;
                
                // 检查浏览器支持
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                this.isSupported = !!SpeechRecognition;
                
                if (this.isSupported) {
                    this.initRecognition();
                }
            }

            initRecognition() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                this.recognition = new SpeechRecognition();
                
                // 关键配置：连续识别 + 中间结果
                this.recognition.continuous = true;
                this.recognition.interimResults = true;
                this.recognition.maxAlternatives = 1;
                this.recognition.lang = this.currentLang;

                // 关键：立即处理结果，不要等待
                this.recognition.onresult = (event) => {
                    this.handleResult(event);
                };

                this.recognition.onerror = (event) => {
                    this.handleError(event);
                };

                this.recognition.onstart = () => {
                    debugLog('语音识别引擎已启动', 'success');
                    this.isRecording = true;
                };

                this.recognition.onend = () => {
                    debugLog('语音识别引擎停止', 'info');
                    // 如果仍在录音状态，自动重启（防止意外中断）
                    if (this.isRecording) {
                        debugLog('尝试自动重启识别引擎...', 'info');
                        setTimeout(() => {
                            if (this.isRecording) {
                                try {
                                    this.recognition.start();
                                } catch(e) {
                                    debugLog('重启失败: ' + e.message, 'error');
                                }
                            }
                        }, 300);
                    }
                };
            }

            handleResult(event) {
                const results = event.results;
                const lastResult = results[results.length - 1];
                const transcript = lastResult[0].transcript;
                const isFinal = lastResult.isFinal;
                const confidence = lastResult[0].confidence || 0.9;

                debugLog(`识别结果: "${transcript.substring(0, 30)}..." final=${isFinal}`, 'info');

                // 立即更新 UI，不要等待
                if (this.onResult) {
                    this.onResult({
                        text: transcript,
                        isFinal: isFinal,
                        confidence: confidence,
                        timestamp: Date.now()
                    });
                }

                // 如果是最终结果，保存到段落
                if (isFinal && transcript.trim()) {
                    this.segments.push({
                        text: transcript,
                        timestamp: Date.now(),
                        confidence: confidence
                    });
                    
                    // 开始新段落
                    if (this.onSegmentEnd) {
                        this.onSegmentEnd();
                    }
                }
            }

            handleError(event) {
                const errorMessages = {
                    'no-speech': '未检测到语音，请靠近麦克风说话',
                    'audio-capture': '无法访问麦克风',
                    'not-allowed': '麦克风权限被拒绝',
                    'network': '网络错误（Web Speech 需要网络）',
                    'aborted': '识别已停止',
                    'language-not-supported': '不支持当前语言'
                };

                const msg = errorMessages[event.error] || `错误: ${event.error}`;
                debugLog(msg, 'error');

                // 不中断录音，静默处理大部分错误
                if (event.error !== 'not-allowed' && event.error !== 'audio-capture') {
                    // 继续录音
                }
            }

            async start() {
                if (!this.isSupported) {
                    throw new Error('浏览器不支持语音识别');
                }

                try {
                    // 1. 获取麦克风权限（关键：先获取音频流）
                    this.stream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            sampleRate: 16000,
                            channelCount: 1,
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    });

                    // 2. 启动 MediaRecorder 保存音频
                    this.mediaRecorder = new MediaRecorder(this.stream, {
                        mimeType: 'audio/webm;codecs=opus'
                    });
                    
                    this.audioChunks = [];
                    this.mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) this.audioChunks.push(e.data);
                    };
                    
                    this.mediaRecorder.start(1000);

                    // 3. 关键：立即启动语音识别
                    debugLog('正在启动语音识别...', 'info');
                    this.recognition.lang = this.currentLang;
                    this.recognition.start();

                    return true;
                } catch (err) {
                    debugLog('启动失败: ' + err.message, 'error');
                    throw err;
                }
            }

            stop() {
                this.isRecording = false;
                
                // 停止语音识别
                if (this.recognition) {
                    try {
                        this.recognition.stop();
                    } catch(e) {}
                }

                // 停止 MediaRecorder
                if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
                    this.mediaRecorder.stop();
                }

                // 停止所有音轨
                if (this.stream) {
                    this.stream.getTracks().forEach(track => track.stop());
                }

                // 返回音频 blob
                return new Promise((resolve) => {
                    if (this.mediaRecorder) {
                        this.mediaRecorder.onstop = () => {
                            const blob = new Blob(this.audioChunks, { type: 'audio/webm' });
                            resolve(blob);
                        };
                    } else {
                        resolve(null);
                    }
                });
            }

            setLanguage(lang) {
                this.currentLang = lang;
                if (this.recognition) {
                    this.recognition.lang = lang;
                    debugLog(`语言切换为: ${lang}`, 'info');
                }
            }
        }

        // ==================== 应用逻辑 ====================

        const recognizer = new FixedSpeechRecognizer();
        let isRecording = false;
        let recordingStartTime = null;
        let recordingTimer = null;
        let audioBlob = null;
        let history = JSON.parse(localStorage.getItem('vs_history') || '[]');
        let settings = JSON.parse(localStorage.getItem('vs_settings') || '{"autoSave": true, "quality": "high"}');
        let currentInterimText = '';

        // DOM 元素
        const recordBtn = document.getElementById('recordBtn');
        const statusPill = document.getElementById('statusPill');
        const statusText = document.getElementById('statusText');
        const timeDisplay = document.getElementById('timeDisplay');
        const visualizerPanel = document.getElementById('visualizerPanel');
        const transcriptContent = document.getElementById('transcriptContent');
        const emptyState = document.getElementById('emptyState');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // 调试日志
        function debugLog(msg, type = 'info') {
            const panel = document.getElementById('debugPanel');
            const line = document.createElement('div');
            line.className = `debug-line ${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            panel.appendChild(line);
            panel.scrollTop = panel.scrollHeight;
            console.log(`[${type}] ${msg}`);
        }

        function toggleDebug() {
            document.getElementById('debugPanel').classList.toggle('show');
        }

        // 初始化
        async function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 检查支持情况
            if (!recognizer.isSupported) {
                showToast('您的浏览器不支持语音识别，请使用 Chrome 或 Edge', 'error');
                recordBtn.disabled = true;
                return;
            }

            // 设置回调
            recognizer.onResult = onRecognitionResult;
            recognizer.onSegmentEnd = onSegmentEnd;
            
            updateHistoryBadge();
            loadSettings();
            
            debugLog('初始化完成，等待开始录音', 'success');
        }

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        // 可视化
        let animationId = null;
        function startVisualizer() {
            const bars = 30;
            const barWidth = canvas.width / bars;
            
            function draw() {
                if (!isRecording) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    return;
                }
                
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 生成模拟波形（实际应连接 analyser）
                for (let i = 0; i < bars; i++) {
                    const h = Math.random() * canvas.height * 0.6 + 10;
                    const x = i * barWidth;
                    const y = (canvas.height - h) / 2;
                    
                    const gradient = ctx.createLinearGradient(0, y, 0, y + h);
                    gradient.addColorStop(0, '#10b981');
                    gradient.addColorStop(1, '#3b82f6');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(x + 2, y, barWidth - 4, h);
                }
                
                animationId = requestAnimationFrame(draw);
            }
            
            draw();
        }

        function stopVisualizer() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 录音控制
        async function toggleRecording() {
            if (isRecording) {
                await stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                debugLog('开始启动录音...', 'info');
                await recognizer.start();
                isRecording = true;
                recordingStartTime = Date.now();
                
                // UI 更新
                recordBtn.classList.add('recording');
                visualizerPanel.classList.add('recording');
                statusPill.className = 'status-pill recording';
                statusText.textContent = '录音中';
                emptyState.style.display = 'none';
                
                // 启动可视化
                startVisualizer();
                
                // 启动计时器
                recordingTimer = setInterval(updateTimer, 1000);
                
                showToast('录音已开始，请说话', 'success');
                debugLog('录音启动成功', 'success');
            } catch (err) {
                showToast('启动失败: ' + err.message, 'error');
                debugLog('启动失败: ' + err.message, 'error');
            }
        }

        async function stopRecording() {
            debugLog('停止录音...', 'info');
            audioBlob = await recognizer.stop();
            isRecording = false;
            
            // UI 更新
            recordBtn.classList.remove('recording');
            visualizerPanel.classList.remove('recording');
            statusPill.className = 'status-pill ready';
            statusText.textContent = '就绪';
            
            clearInterval(recordingTimer);
            timeDisplay.textContent = '00:00';
            
            stopVisualizer();
            
            // 自动保存
            if (settings.autoSave && recognizer.segments.length > 0) {
                saveToHistory();
            }
            
            showToast('录音已保存', 'success');
            updateButtons();
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const secs = (elapsed % 60).toString().padStart(2, '0');
            timeDisplay.textContent = `${mins}:${secs}`;
        }

        // 识别结果处理 - 关键修复：立即更新 UI
        let currentSegmentEl = null;

        function onRecognitionResult(result) {
            // 隐藏空状态
            if (emptyState.style.display !== 'none') {
                emptyState.style.display = 'none';
            }

            if (result.isFinal) {
                // 最终结果：创建固定段落
                if (currentInterimText) {
                    // 更新现有段落为最终结果
                    if (currentSegmentEl) {
                        currentSegmentEl.className = 'segment';
                        const textEl = currentSegmentEl.querySelector('.segment-text');
                        textEl.textContent = result.text;
                        
                        // 移除光标
                        const cursor = textEl.querySelector('.cursor');
                        if (cursor) cursor.remove();
                    }
                    currentInterimText = '';
                    currentSegmentEl = null;
                }
                
                // 触发新段落开始（为下一句准备）
                setTimeout(() => {
                    if (isRecording) {
                        createNewSegment();
                    }
                }, 200);
            } else {
                // 中间结果：实时更新
                currentInterimText = result.text;
                
                if (!currentSegmentEl) {
                    createNewSegment();
                }
                
                // 立即更新文本，不要等待
                const textEl = currentSegmentEl.querySelector('.segment-text');
                textEl.textContent = result.text;
                
                // 添加闪烁光标
                if (!textEl.querySelector('.cursor')) {
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';
                    textEl.appendChild(cursor);
                }
            }
            
            updateStats();
            scrollToBottom();
        }

        function createNewSegment() {
            currentSegmentEl = document.createElement('div');
            currentSegmentEl.className = 'segment interim';
            currentSegmentEl.innerHTML = `
                <div class="segment-time">${new Date().toLocaleTimeString()}</div>
                <div class="segment-text"></div>
            `;
            transcriptContent.appendChild(currentSegmentEl);
            scrollToBottom();
        }

        function onSegmentEnd() {
            // 段落结束时的清理工作
            updateStats();
            updateButtons();
        }

        function scrollToBottom() {
            transcriptContent.scrollTop = transcriptContent.scrollHeight;
        }

        function updateStats() {
            const totalChars = recognizer.segments.reduce((sum, seg) => sum + seg.text.length, 0) + currentInterimText.length;
            document.getElementById('wordCount').textContent = totalChars + ' 字';
            document.getElementById('segCount').textContent = recognizer.segments.length + ' 段';
        }

        function updateButtons() {
            const hasContent = recognizer.segments.length > 0 || currentInterimText.length > 0;
            document.getElementById('copyBtn').disabled = !hasContent;
            document.getElementById('exportBtn').disabled = !hasContent;
        }

        // 工具函数
        function changeLanguage(lang) {
            recognizer.setLanguage(lang);
            showToast(`已切换语言: ${lang}`, 'success');
        }

        function copyText() {
            const text = recognizer.segments.map(s => s.text).join('\n');
            if (!text) return;
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板', 'success');
            });
        }

        function exportText() {
            const text = recognizer.segments.map(s => `[${new Date(s.timestamp).toLocaleTimeString()}] ${s.text}`).join('\n');
            if (!text) return;
            
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `转写_${new Date().toLocaleDateString()}.txt`;
            a.click();
            showToast('已导出', 'success');
        }

        function clearAll() {
            if (recognizer.segments.length === 0 && !currentInterimText) return;
            if (!confirm('确定清空当前内容？')) return;
            
            recognizer.segments = [];
            currentInterimText = '';
            transcriptContent.innerHTML = '';
            transcriptContent.appendChild(emptyState);
            emptyState.style.display = 'flex';
            updateStats();
            updateButtons();
            showToast('已清空', 'success');
        }

        // 历史记录
        function saveToHistory() {
            const item = {
                id: Date.now(),
                date: new Date().toLocaleString(),
                duration: timeDisplay.textContent,
                segments: recognizer.segments.length,
                text: recognizer.segments.map(s => s.text).join('\n'),
                preview: recognizer.segments[0]?.text?.slice(0, 50) + '...' || '无内容'
            };
            
            history.unshift(item);
            if (history.length > 50) history = history.slice(0, 50);
            localStorage.setItem('vs_history', JSON.stringify(history));
            updateHistoryBadge();
            debugLog('已保存到历史记录', 'success');
        }

        function updateHistoryBadge() {
            const btn = document.getElementById('historyBtn');
            if (history.length > 0) {
                btn.classList.add('has-content');
            }
        }

        function showHistory() {
            const modal = document.getElementById('historyModal');
            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                list.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">暂无历史记录</div>';
            } else {
                list.innerHTML = history.map(item => `
                    <div class="recording-item" onclick="loadHistory(${item.id})">
                        <div class="recording-icon">📝</div>
                        <div class="recording-info">
                            <div class="recording-name">${item.date}</div>
                            <div class="recording-meta">
                                <span>${item.duration}</span>
                                <span>${item.segments} 段</span>
                                <span>${item.text.length} 字</span>
                            </div>
                            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                ${item.preview}
                            </div>
                        </div>
                        <div class="recording-actions" onclick="event.stopPropagation()">
                            <button class="action-btn" onclick="deleteHistory(${item.id})">🗑</button>
                        </div>
                    </div>
                `).join('');
            }
            
            modal.classList.add('show');
        }

        function closeHistory() {
            document.getElementById('historyModal').classList.remove('show');
        }

        function loadHistory(id) {
            const item = history.find(h => h.id === id);
            if (!item) return;
            
            // 加载到当前编辑器
            recognizer.segments = item.text.split('\n').map((text, i) => ({
                text: text,
                timestamp: Date.now() + i,
                confidence: 1
            }));
            
            // 重新渲染
            transcriptContent.innerHTML = '';
            recognizer.segments.forEach(seg => {
                const div = document.createElement('div');
                div.className = 'segment';
                div.innerHTML = `
                    <div class="segment-time">${new Date(seg.timestamp).toLocaleTimeString()}</div>
                    <div class="segment-text">${escapeHtml(seg.text)}</div>
                `;
                transcriptContent.appendChild(div);
            });
            
            emptyState.style.display = 'none';
            updateStats();
            updateButtons();
            closeHistory();
            showToast('已加载历史记录', 'success');
        }

        function deleteHistory(id) {
            history = history.filter(h => h.id !== id);
            localStorage.setItem('vs_history', JSON.stringify(history));
            showHistory();
            updateHistoryBadge();
            showToast('已删除', 'success');
        }

        // 设置
        function showSettings() {
            document.getElementById('settingsModal').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('show');
        }

        function setEngine(engine, btn) {
            updateActiveButton(btn);
            showToast(engine === 'webspeech' ? '使用 Web Speech API' : 'Whisper 模式开发中', 'success');
        }

        function setAutoSave(value, btn) {
            settings.autoSave = value;
            saveSettings();
            updateActiveButton(btn);
        }

        function setQuality(quality, btn) {
            settings.quality = quality;
            saveSettings();
            updateActiveButton(btn);
        }

        function updateActiveButton(activeBtn) {
            const parent = activeBtn.parentElement;
            parent.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        function saveSettings() {
            localStorage.setItem('vs_settings', JSON.stringify(settings));
        }

        function loadSettings() {
            // 应用设置到 UI
        }

        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', init);

        // 防止误关闭
        window.onbeforeunload = (e) => {
            if (isRecording) {
                e.preventDefault();
                e.returnValue = '';
            }
        };
    </script>
</body>
</html>
