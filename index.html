<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <!-- 关键修复：添加跨域隔离头，允许使用 SharedArrayBuffer (部分浏览器需要) -->
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <title>语音转写 · 离线版 (Whisper 修复版)</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* 样式保持不变 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 12px; color: #1e293b;
        }
        .app-container {
            width: 100%; max-width: 480px; background: white; border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 6px 12px rgba(0,0,0,0.05);
            overflow: hidden; backdrop-filter: blur(2px); border: 1px solid rgba(255,255,255,0.3);
        }
        .header { padding: 24px 24px 16px 24px; background: white; border-bottom: 1px solid #f0f2f5; }
        .header h1 {
            font-size: 1.9rem; font-weight: 600; letter-spacing: -0.02em;
            background: linear-gradient(145deg, #0f172a, #334155); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
        }
        .header h1 i { background: #eef2ff; padding: 8px; border-radius: 18px; color: #4f46e5; font-size: 1.4rem; -webkit-text-fill-color: #4f46e5; }
        .lang-selector {
            display: flex; gap: 10px; margin-top: 12px; background: #f8fafc; padding: 6px; border-radius: 48px; border: 1px solid #e2e8f0;
        }
        .lang-option {
            flex: 1; text-align: center; padding: 10px 6px; font-size: 1rem; font-weight: 500; border-radius: 40px;
            background: transparent; border: none; color: #64748b; transition: all 0.2s ease; cursor: pointer;
        }
        .lang-option.active { background: #ffffff; color: #0f172a; box-shadow: 0 4px 10px rgba(0,0,0,0.03); font-weight: 600; border: 0.5px solid #d9e2ef; }
        .live-card {
            background: #ffffff; margin: 20px 24px; padding: 24px 20px; border-radius: 28px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02), 0 8px 18px -6px rgba(0,20,40,0.12);
            border: 1px solid #ffffff80; min-height: 160px; display: flex; flex-direction: column;
        }
        .transcript-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .transcript-label i { font-size: 0.9rem; }
        .live-transcript {
            font-size: 1.3rem; line-height: 1.5; font-weight: 420; color: #0b1e33; word-break: break-word;
            white-space: pre-wrap; flex: 1; min-height: 80px; max-height: 240px; overflow-y: auto; padding-right: 8px; scrollbar-width: thin;
        }
        .status-badge {
            align-self: flex-end; font-size: 0.75rem; padding: 6px 14px; background: #f1f4f9; border-radius: 40px;
            color: #475569; margin-top: 12px; display: inline-flex; align-items: center; gap: 6px;
        }
        .status-badge.recording { background: #fee2e2; color: #b91c1c; }
        .status-badge i { font-size: 0.7rem; }
        .control-panel { display: flex; justify-content: space-around; padding: 8px 24px 24px 24px; gap: 12px; flex-wrap: wrap; }
        .ctrl-btn {
            flex: 1; background: #fefefe; border: 1px solid #e9edf2; border-radius: 56px; padding: 16px 0;
            font-size: 1rem; font-weight: 550; color: #1e293b; box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            transition: all 0.15s ease; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; backdrop-filter: blur(2px);
        }
        .ctrl-btn:active { background: #f1f5f9; transform: scale(0.97); }
        .ctrl-btn.primary { background: #1e293b; border-color: #1e293b; color: white; box-shadow: 0 10px 18px -8px #1e293b80; }
        .ctrl-btn.primary:active { background: #0f172a; }
        .ctrl-btn:disabled { opacity: 0.4; filter: grayscale(0.5); pointer-events: none; }
        .upload-area {
            margin: 0 24px 20px 24px; padding: 16px; border: 2px dashed #cbd5e1; border-radius: 28px;
            text-align: center; background: #f8fafc; cursor: pointer; transition: 0.2s;
            position: relative;
        }
        .upload-area:hover { background: #f1f5f9; }
        .upload-area i { font-size: 2rem; color: #4f46e5; margin-bottom: 8px; }
        .upload-area p { color: #475569; font-weight: 500; }
        #fileInput { display: none; }
        .model-loading { font-size: 0.85rem; color: #2563eb; margin-top: 8px; min-height: 1.2em;}
        .progress-bar {
            width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; margin-top: 10px; overflow: hidden; display: none;
        }
        .progress-fill {
            height: 100%; background: #4f46e5; width: 0%; transition: width 0.3s;
        }
        .history-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px 8px 24px; }
        .history-header h2 { font-size: 1.25rem; font-weight: 590; color: #1e293b; }
        .history-header button {
            background: none; border: none; color: #4f46e5; font-size: 0.95rem; font-weight: 500;
            padding: 8px 12px; border-radius: 30px; background: #f1f4f9; display: flex; align-items: center; gap: 6px; cursor: pointer;
        }
        .history-list { padding: 0 24px 30px 24px; max-height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .history-item {
            background: #ffffff; border-radius: 22px; padding: 18px 16px; border: 1px solid #edf2f7;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.08); transition: 0.1s; display: flex; flex-direction: column; gap: 12px;
        }
        .history-meta { display: flex; align-items: center; gap: 12px; font-size: 0.75rem; color: #64748b; }
        .history-meta i { width: 16px; }
        .history-text {
            font-size: 1rem; font-weight: 450; color: #0f172a; background: #f8fafc; padding: 14px;
            border-radius: 18px; line-height: 1.4; word-break: break-word; max-height: 100px; overflow-y: auto;
        }
        .history-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 4px; flex-wrap: wrap; }
        .history-actions button {
            background: transparent; border: none; color: #4b5563; font-size: 1.1rem; width: 44px; height: 44px;
            border-radius: 40px; display: inline-flex; align-items: center; justify-content: center;
            background: #f1f4f9; cursor: pointer; transition: 0.1s;
        }
        .history-actions button:active { background: #e2e8f0; }
        .toast-message {
            position: fixed; bottom: 30px; left: 20px; right: 20px; max-width: 400px; margin: 0 auto;
            background: #1e293b; color: white; padding: 14px 24px; border-radius: 60px; font-size: 0.95rem;
            text-align: center; box-shadow: 0 20px 30px -10px black; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 1000;
        }
        .audio-meter {
            display: flex; gap: 2px; height: 20px; align-items: flex-end; margin-top: 8px; opacity: 0; transition: opacity 0.3s;
        }
        .audio-bar {
            width: 4px; background: #4f46e5; border-radius: 2px; transition: height 0.1s;
        }
        .error-details {
            font-size: 0.75rem; color: #dc2626; background: #fef2f2; padding: 8px; border-radius: 8px;
            margin-top: 8px; word-break: break-all; display: none; border: 1px solid #fecaca;
        }
        .cache-control {
            margin-top: 10px;
            font-size: 0.75rem;
        }
        .cache-control a {
            color: #64748b;
            text-decoration: underline;
            cursor: pointer;
        }
        .cache-control a:hover { color: #dc2626; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1><i class="fas fa-microphone-lines"></i> 语音转写·离线版</h1>
            <div class="lang-selector" id="langSelector">
                <button class="lang-option active" data-lang="zh-CN">🇨 中文</button>
                <button class="lang-option" data-lang="en-US">🇬🇧 英文</button>
            </div>
        </div>

        <div class="live-card">
            <div class="transcript-label"><i class="far fa-comment-dots"></i> 实时转写</div>
            <div class="live-transcript" id="liveTranscript">点击开始，对着麦克风说话...</div>
            <div class="audio-meter" id="audioMeter"></div>
            <div class="status-badge" id="statusBadge"><i class="fas fa-circle"></i> 空闲</div>
        </div>

        <div class="control-panel">
            <button class="ctrl-btn primary" id="startBtn"><i class="fas fa-play"></i> 开始</button>
            <button class="ctrl-btn" id="stopBtn" disabled><i class="fas fa-stop"></i> 停止</button>
        </div>

        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>点击或拖拽上传音频文件</p>
            <p style="font-size:0.8rem; color:#64748b;">支持 mp3, m4a, wav, webm 等 (首次需下载模型)</p>
            
            <div id="modelStatus" class="model-loading">⚡ 准备就绪</div>
            
            <div id="progressContainer" class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            
            <div id="errorDetails" class="error-details"></div>
            
            <div class="cache-control">
                <a onclick="clearCacheAndReload()">❌ 模型加载失败？点击清除缓存重试</a>
            </div>
        </div>
        <input type="file" id="fileInput" accept="audio/*">

        <div class="history-header">
            <h2><i class="far fa-clock"></i> 本地记录</h2>
            <button id="exportAllBtn"><i class="fas fa-download"></i> 全部导出</button>
        </div>

        <div class="history-list" id="historyList">
            <div style="text-align: center; color: #94a3b8; padding: 30px 0;">暂无转写记录</div>
        </div>
    </div>

    <div id="toast" class="toast-message"></div>

    <!-- 关键修复：使用 ES Module 动态导入 -->
    <script type="module">
        // ========== 关键修复 1: 在 import 之前强制设置环境变量 ==========
        if (typeof self !== 'undefined') {
            self.env = self.env || {};
            // 【核心修复】强制使用国内镜像，解决 429 和连接超时问题
            self.env.remoteHost = 'https://hf-mirror.com';
            // 启用缓存
            self.env.useCache = true;
            // 禁用 WebGPU，强制使用 WASM (兼容性更好)
            self.env.backends = ['wasm'];
            // 增加超时时间到 60 秒
            self.env.timeout = 60000; 
        }

        // ========== 关键修复 2: 使用可靠的 CDN 导入 ==========
        const CDN_URL = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.5/+esm';
        
        let pipeline, env;
        
        try {
            // 动态导入 transformers.js
            const transformers = await import(CDN_URL);
            pipeline = transformers.pipeline;
            env = transformers.env;
            
            console.log('✅ Transformers.js 库加载成功');
            document.getElementById('modelStatus').innerText = '✅ 核心库已加载，准备模型...';
        } catch (importError) {
            console.error('❌ CDN 导入失败:', importError);
            showError('CDN 库加载失败: ' + importError.message);
            
            // 回退方案：尝试 unpkg
            try {
                const fallbackTransformers = await import('https://unpkg.com/@huggingface/transformers@3.7.5/+esm');
                pipeline = fallbackTransformers.pipeline;
                env = fallbackTransformers.env;
                console.log('✅ 从 unpkg 回退加载成功');
                document.getElementById('modelStatus').innerText = '✅ 核心库已加载 (备用源)';
            } catch (fallbackError) {
                console.error('❌ 所有 CDN 均失败:', fallbackError);
                showError('所有 CDN 均失败，请检查网络<br>错误：' + fallbackError.message);
                throw new Error('Transformers.js 无法加载');
            }
        }

        // 辅助函数：显示错误详情
        function showError(msg) {
            const errorEl = document.getElementById('errorDetails');
            const statusEl = document.getElementById('modelStatus');
            errorEl.innerHTML = msg;
            errorEl.style.display = 'block';
            statusEl.innerText = '❌ 加载失败';
            statusEl.style.color = '#dc2626';
        }

        // ========== 以下保持原有逻辑，但使用导入的 pipeline ==========
        
        // 初始化音频可视化条
        const audioMeter = document.getElementById('audioMeter');
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'audio-bar';
            bar.style.height = '4px';
            audioMeter.appendChild(bar);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        // DOM 元素
        const liveTranscriptEl = document.getElementById('liveTranscript');
        const statusBadge = document.getElementById('statusBadge');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const langSelector = document.getElementById('langSelector');
        const historyListEl = document.getElementById('historyList');
        const toastEl = document.getElementById('toast');
        const exportAllBtn = document.getElementById('exportAllBtn');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const modelStatus = document.getElementById('modelStatus');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');

        // 状态
        let currentStream = null;
        let mediaRecorder = null;
        let recognition = null;
        let isRecording = false;
        let userStopped = false;
        let finalTranscriptSegments = [];
        let audioChunks = [];
        let currentLanguage = 'zh-CN';
        let analyser = null;
        let visualizerInterval = null;

        // Transformers.js 相关变量
        let transformersPipeline = null;
        let isModelLoading = false;
        let isModelLoaded = false;

        // ========== 关键修复 3: 引入 pipelinePromise，确保多次调用等待同一个加载过程 ==========
        let pipelinePromise = null;  // 用于存储加载模型的 Promise

        // IndexedDB
        const DB_NAME = 'VoiceTranscriptDB_v2';
        const STORE_NAME = 'recordings';
        const DB_VERSION = 1;
        let db = null;

        // ---------- 数据库 (保持不变) ----------
        function openDB() {
            return new Promise((resolve, reject) => {
                if (db) return resolve(db);
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject('数据库打开失败');
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                    }
                };
            });
        }

        async function addRecording(blob, transcript, lang, source = 'mic') {
            await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const entry = {
                    timestamp: Date.now(),
                    audioBlob: blob,
                    transcript: transcript || ' ',
                    language: lang,
                    source: source
                };
                const req = store.add(entry);
                req.onsuccess = () => resolve();
                req.onerror = reject;
            });
        }

        async function getAllRecordings() {
            await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result || []);
                req.onerror = reject;
            });
        }

        async function deleteRecording(id) {
            await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.delete(id);
                req.onsuccess = () => resolve();
                req.onerror = reject;
            });
        }

        // ---------- 渲染历史 (保持不变) ----------
        async function renderHistory() {
            try {
                const records = await getAllRecordings();
                if (records.length === 0) {
                    historyListEl.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 30px 0;">暂无转写记录</div>';
                    return;
                }
                records.sort((a,b) => b.timestamp - a.timestamp);
                let html = '';
                records.forEach(rec => {
                    const date = new Date(rec.timestamp).toLocaleString(undefined, { hour12: false });
                    html += `
                    <div class="history-item" data-id="${rec.id}">
                        <div class="history-meta">
                            <i class="far fa-calendar-alt"></i> ${date}  ·  ${rec.language === 'zh-CN' ? '中文' : '英文'} · ${rec.source === 'mic' ? '🎤实时' : '📁上传'}
                        </div>
                        <div class="history-text">${escapeHtml(rec.transcript) || '无文本'}</div>
                        <div class="history-actions">
                            <button class="play-audio" title="播放"><i class="fas fa-play"></i></button>
                            <button class="export-text" title="导出文本"><i class="fas fa-file-alt"></i></button>
                            <button class="export-audio" title="导出音频"><i class="fas fa-download"></i></button>
                            <button class="delete-entry" title="删除"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>`;
                });
                historyListEl.innerHTML = html;

                document.querySelectorAll('.history-item').forEach(item => {
                    const id = Number(item.dataset.id);
                    const record = records.find(r => r.id === id);
                    if (!record) return;

                    item.querySelector('.play-audio')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const url = URL.createObjectURL(record.audioBlob);
                        new Audio(url).play();
                        setTimeout(() => URL.revokeObjectURL(url), 10000);
                    });

                    item.querySelector('.export-text')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const blob = new Blob(['\uFEFF' + record.transcript], { type: 'text/plain;charset=utf-8' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `transcript_${record.timestamp}.txt`;
                        a.click();
                        URL.revokeObjectURL(url);
                        showToast('文本已导出');
                    });

                    item.querySelector('.export-audio')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const url = URL.createObjectURL(record.audioBlob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `audio_${record.timestamp}.webm`;
                        a.click();
                        URL.revokeObjectURL(url);
                        showToast('音频已导出');
                    });

                    item.querySelector('.delete-entry')?.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        await deleteRecording(id);
                        renderHistory();
                        showToast('已删除');
                    });
                });
            } catch (e) {
                console.error(e);
            }
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
        }

        function showToast(msg, duration = 2000) {
            toastEl.style.opacity = '1';
            toastEl.innerText = msg;
            setTimeout(() => toastEl.style.opacity = '0', duration);
        }

        // ---------- 实时录音 (保持不变) ----------
        function closeStream() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            if (visualizerInterval) {
                clearInterval(visualizerInterval);
                visualizerInterval = null;
            }
            audioMeter.style.opacity = '0';
        }

        function updateVisualizer() {
            if (!analyser) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const bars = audioMeter.querySelectorAll('.audio-bar');
            const step = Math.floor(data.length / bars.length);
            
            bars.forEach((bar, i) => {
                const value = data[i * step];
                const height = Math.max(4, (value / 255) * 20);
                bar.style.height = height + 'px';
            });
        }

        async function saveToDBAndCleanup() {
            try {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const fullTranscript = finalTranscriptSegments.join(' ').trim() || '（无语音识别文本）';
                await addRecording(blob, fullTranscript, currentLanguage, 'mic');
                showToast('已保存到本地记录');
            } catch (e) {
                console.warn('保存失败', e);
                showToast('保存失败');
            } finally {
                closeStream();
                isRecording = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                statusBadge.innerHTML = '<i class="fas fa-circle"></i> 空闲';
                statusBadge.classList.remove('recording');
                liveTranscriptEl.innerText = '点击开始，对着麦克风说话...';
                renderHistory();
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            userStopped = true;
            if (recognition) {
                try { recognition.stop(); } catch (e) {}
            }
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        async function startRecording() {
            if (isRecording) return;
            finalTranscriptSegments = [];
            audioChunks = [];
            userStopped = false;

            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });
            } catch (err) {
                showToast('无法访问麦克风：' + err.message);
                return;
            }

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;
            const source = audioCtx.createMediaStreamSource(currentStream);
            source.connect(analyser);
            visualizerInterval = setInterval(updateVisualizer, 100);
            audioMeter.style.opacity = '1';

            if (SpeechRecognition) {
                try {
                    recognition = new SpeechRecognition();
                    recognition.continuous = true;
                    recognition.interimResults = true;
                    recognition.lang = currentLanguage;
                    
                    recognition.onresult = (event) => {
                        let interim = '';
                        for (let i = 0; i < event.results.length; i++) {
                            const result = event.results[i];
                            if (result.isFinal) {
                                const text = result[0].transcript;
                                if (!finalTranscriptSegments.length || finalTranscriptSegments[finalTranscriptSegments.length-1] !== text) {
                                    finalTranscriptSegments.push(text);
                                }
                            } else {
                                interim += result[0].transcript;
                            }
                        }
                        const finalText = finalTranscriptSegments.join(' ');
                        liveTranscriptEl.innerText = finalText + (interim ? ' ' + interim : '');
                    };
                    
                    recognition.onerror = (e) => {
                        console.warn('识别错误:', e.error);
                        if (!userStopped && isRecording) {
                            setTimeout(() => {
                                if (!userStopped && isRecording) {
                                    try { recognition.start(); } catch (err) {}
                                }
                            }, 500);
                        }
                    };
                    
                    recognition.onend = () => {
                        if (!userStopped && isRecording) {
                            setTimeout(() => {
                                if (!userStopped && isRecording) {
                                    try { recognition.start(); } catch (err) {}
                                }
                            }, 300);
                        }
                    };
                } catch (e) {
                    console.error('语音识别初始化失败', e);
                    recognition = null;
                }
            }

            try {
                mediaRecorder = new MediaRecorder(currentStream, {
                    mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
                });
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                mediaRecorder.onstop = saveToDBAndCleanup;
                mediaRecorder.start(200);
            } catch (e) {
                showToast('媒体录制初始化失败');
                closeStream();
                return;
            }

            if (recognition) {
                try { 
                    recognition.start(); 
                } catch (e) {
                    showToast('识别启动失败');
                    mediaRecorder.stop();
                    return;
                }
            }

            isRecording = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusBadge.innerHTML = '<i class="fas fa-circle"></i> 录音中...';
            statusBadge.classList.add('recording');
            liveTranscriptEl.innerText = '正在聆听...';
        }

        // ========== 关键修复 4: 带重试机制的模型加载逻辑，并使用 pipelinePromise ==========
        async function loadWhisperPipeline() {
            // 如果已经加载完成，直接返回 pipeline
            if (transformersPipeline) return transformersPipeline;
            
            // 如果已经在加载中，返回已有的 Promise
            if (pipelinePromise) return pipelinePromise;

            // 创建新的加载 Promise
            pipelinePromise = (async () => {
                isModelLoading = true;
                modelStatus.innerText = '⏳ 正在连接镜像站下载模型...';
                progressContainer.style.display = 'block';
                progressFill.style.width = '5%';
                document.getElementById('errorDetails').style.display = 'none';

                // 超时提示
                const timeoutId = setTimeout(() => {
                    if (isModelLoading) {
                        modelStatus.innerText = '⚠️ 下载较慢，请耐心等待 (大文件)...';
                        progressFill.style.width = '30%';
                    }
                }, 30000);

                try {
                    let attempt = 0;
                    const maxAttempts = 3;
                    
                    while (attempt < maxAttempts) {
                        attempt++;
                        try {
                            console.log(`尝试加载模型 (第 ${attempt} 次)...`);
                            modelStatus.innerText = `⏳ 加载模型中... (尝试 ${attempt}/${maxAttempts})`;
                            
                            transformersPipeline = await pipeline(
                                'automatic-speech-recognition',
                                'Xenova/whisper-tiny',
                                {
                                    quantized: true,
                                    revision: 'main',
                                    progress_callback: (progress) => {
                                        if (progress.status === 'progress' && progress.total) {
                                            const percent = Math.max(5, (progress.loaded / progress.total) * 100);
                                            progressFill.style.width = percent + '%';
                                            modelStatus.innerText = `⏳ 下载中 ${Math.round(percent)}%`;
                                        } else if (progress.status === 'init') {
                                            progressFill.style.width = '10%';
                                            modelStatus.innerText = '⏳ 初始化模型...';
                                        } else if (progress.status === 'done') {
                                            progressFill.style.width = '100%';
                                            modelStatus.innerText = '✅ 模型加载完成';
                                        }
                                    }
                                }
                            );
                            
                            // 成功加载，跳出循环
                            break; 
                            
                        } catch (innerError) {
                            console.warn(`模型加载尝试 ${attempt} 失败:`, innerError);
                            if (attempt >= maxAttempts) throw innerError;
                            
                            // 等待后重试 (指数退避)
                            const waitTime = 2000 * attempt;
                            modelStatus.innerText = `⚠️ 网络波动，${waitTime/1000}秒后重试...`;
                            await new Promise(resolve => setTimeout(resolve, waitTime));
                        }
                    }
                    
                    clearTimeout(timeoutId);
                    isModelLoaded = true;
                    showToast('模型加载完成！可以上传文件了');
                    setTimeout(() => progressContainer.style.display = 'none', 2000);
                    
                } catch (e) {
                    clearTimeout(timeoutId);
                    console.error('模型加载最终失败:', e);
                    modelStatus.innerText = '❌ 加载失败';
                    progressFill.style.width = '0%';
                    
                    let errorMsg = e.message;
                    if (errorMsg.includes('Failed to fetch')) {
                        errorMsg = '网络连接失败 (Failed to fetch)<br>可能是镜像站暂时不可用，请清除缓存后重试。';
                    }
                    
                    showError('模型加载失败：<br>' + errorMsg);
                    showToast('模型加载失败，请检查网络');
                    transformersPipeline = null;
                    // 加载失败，清除 pipelinePromise 以便重试
                    pipelinePromise = null;
                    throw e;
                } finally {
                    isModelLoading = false;
                }
                return transformersPipeline;
            })();

            return pipelinePromise;
        }

        async function getPipeline() {
            if (transformersPipeline) return transformersPipeline;
            // 如果没有正在进行的加载，则开始加载
            if (!pipelinePromise) {
                pipelinePromise = loadWhisperPipeline();
            }
            // 等待加载完成（返回 pipeline 或抛出异常）
            return await pipelinePromise;
        }

        // 暴露给全局用于清除缓存
        window.clearCacheAndReload = async function() {
            if(confirm('确定要清除模型缓存并刷新页面吗？\n这将重新下载模型文件。')) {
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                }
                // 清除 IndexedDB 中的模型缓存 (如果有)
                const req = indexedDB.deleteDatabase('transformers-cache');
                req.onsuccess = () => {
                    location.reload();
                };
                req.onerror = () => {
                    location.reload();
                };
            }
        };

        // 上传区域点击
        uploadArea.addEventListener('click', () => {
            // 如果模型未加载且未在加载中，则触发加载（但不等待）
            if (!transformersPipeline && !isModelLoading && !pipelinePromise) {
                loadWhisperPipeline().catch(() => {});
            }
            fileInput.click();
        });

        // 文件选择处理
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const validExts = ['.mp3', '.m4a', '.wav', '.webm', '.ogg', '.aac'];
            const ext = '.' + file.name.split('.').pop().toLowerCase();
            if (!validExts.includes(ext)) {
                showToast('请选择有效的音频文件');
                fileInput.value = '';
                return;
            }
            if (file.size > 50 * 1024 * 1024) {
                showToast('文件过大（>50MB），请分割后上传');
                fileInput.value = '';
                return;
            }

            let pipe;
            try {
                pipe = await getPipeline();  // 这里会等待加载完成
            } catch (err) {
                showToast('模型加载失败，请稍后重试');
                fileInput.value = '';
                return;
            }

            if (!pipe) {
                showToast('模型未就绪，请稍后重试');
                fileInput.value = '';
                return;
            }

            showToast('正在识别，请稍候...');
            modelStatus.innerText = '🔍 识别中...';
            document.getElementById('errorDetails').style.display = 'none';

            let audioContext = null;
            let offlineCtx = null;

            try {
                const arrayBuffer = await file.arrayBuffer();
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                const targetSampleRate = 16000;
                const duration = audioBuffer.duration;
                const newLength = Math.ceil(duration * targetSampleRate);
                
                offlineCtx = new OfflineAudioContext(1, newLength, targetSampleRate);
                const source = offlineCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(offlineCtx.destination);
                source.start();
                
                const renderedBuffer = await offlineCtx.startRendering();
                const audioData = renderedBuffer.getChannelData(0);

                const language = currentLanguage === 'zh-CN' ? 'zh' : 'en';
                const result = await pipe(audioData, { 
                    language: language, 
                    task: 'transcribe',
                    return_timestamps: false
                });
                
                const transcript = result.text;

                const originalBlob = new Blob([arrayBuffer], { type: file.type });
                await addRecording(originalBlob, transcript, currentLanguage, 'upload');

                liveTranscriptEl.innerText = transcript;
                showToast('识别完成，已保存');
                renderHistory();
                
            } catch (err) {
                console.error('识别失败:', err);
                showToast('识别失败：' + err.message);
            } finally {
                if (audioContext && audioContext.state !== 'closed') {
                    await audioContext.close();
                }
                audioContext = null;
                offlineCtx = null;
                if(isModelLoaded) {
                    modelStatus.innerText = '✅ 模型已就绪';
                }
                fileInput.value = '';
            }
        });

        // ---------- 事件绑定 ----------
        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);

        langSelector.addEventListener('click', (e) => {
            const btn = e.target.closest('.lang-option');
            if (!btn) return;
            const lang = btn.dataset.lang;
            if (!lang) return;
            document.querySelectorAll('.lang-option').forEach(opt => opt.classList.remove('active'));
            btn.classList.add('active');
            currentLanguage = lang;
            showToast(`语言切换为 ${lang === 'zh-CN' ? '中文' : '英文'}`);
        });

        exportAllBtn.addEventListener('click', async () => {
            try {
                const records = await getAllRecordings();
                if (records.length === 0) {
                    showToast('暂无记录');
                    return;
                }
                records.sort((a, b) => a.timestamp - b.timestamp);
                let content = '';
                for (const r of records) {
                    const date = new Date(r.timestamp).toLocaleString();
                    content += `--- ${date} (${r.language}) [${r.source === 'mic' ? '实时' : '上传'}] ---\n`;
                    content += (r.transcript || '无文本') + '\n\n';
                }
                const blob = new Blob(['\uFEFF' + content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `全部转写_${Date.now()}.txt`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('全部文本已导出');
            } catch (e) {
                console.error('导出失败', e);
                showToast('导出失败：' + e.message);
            }
        });

        // 初始化
        openDB().then(() => {
            renderHistory();
        }).catch(e => {
            console.error(e);
            showToast('数据库初始化失败');
        });

        // 暴露到全局供调试
        window.loadWhisperPipeline = loadWhisperPipeline;
        window.getPipeline = getPipeline;
        window.transformersLoaded = true;
    </script>
</body>
</html>
