<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>语音转写·云API专业版</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: #1e293b;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 6px 12px rgba(0,0,0,0.05);
            overflow: hidden;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header {
            padding: 24px 24px 16px 24px;
            background: white;
            border-bottom: 1px solid #f0f2f5;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 i {
            background: #eef2ff;
            padding: 8px;
            border-radius: 18px;
            color: #4f46e5;
            font-size: 1.4rem;
            -webkit-text-fill-color: #4f46e5;
        }

        .lang-selector {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            background: #f8fafc;
            padding: 6px;
            border-radius: 48px;
            border: 1px solid #e2e8f0;
        }

        .lang-option {
            flex: 1;
            text-align: center;
            padding: 10px 6px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 40px;
            background: transparent;
            border: none;
            color: #64748b;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .lang-option.active {
            background: #ffffff;
            color: #0f172a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            font-weight: 600;
            border: 0.5px solid #d9e2ef;
        }

        .live-card {
            background: #ffffff;
            margin: 20px 24px;
            padding: 24px 20px;
            border-radius: 28px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02), 0 8px 18px -6px rgba(0,20,40,0.12);
            border: 1px solid #ffffff80;
            min-height: 160px;
            display: flex;
            flex-direction: column;
        }

        .transcript-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .transcript-label i {
            font-size: 0.9rem;
        }

        .live-transcript {
            font-size: 1.3rem;
            line-height: 1.5;
            font-weight: 420;
            color: #0b1e33;
            word-break: break-word;
            white-space: pre-wrap;
            flex: 1;
            min-height: 80px;
            max-height: 240px;
            overflow-y: auto;
            padding-right: 8px;
            scrollbar-width: thin;
        }

        .status-badge {
            align-self: flex-end;
            font-size: 0.75rem;
            padding: 6px 14px;
            background: #f1f4f9;
            border-radius: 40px;
            color: #475569;
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.recording {
            background: #fee2e2;
            color: #b91c1c;
        }

        .status-badge i {
            font-size: 0.7rem;
        }

        .control-panel {
            display: flex;
            justify-content: space-around;
            padding: 8px 24px 24px 24px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            flex: 1;
            background: #fefefe;
            border: 1px solid #e9edf2;
            border-radius: 56px;
            padding: 16px 0;
            font-size: 1rem;
            font-weight: 550;
            color: #1e293b;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            backdrop-filter: blur(2px);
        }

        .ctrl-btn:active {
            background: #f1f5f9;
            transform: scale(0.97);
        }

        .ctrl-btn.primary {
            background: #1e293b;
            border-color: #1e293b;
            color: white;
            box-shadow: 0 10px 18px -8px #1e293b80;
        }

        .ctrl-btn.primary:active {
            background: #0f172a;
        }

        .ctrl-btn:disabled {
            opacity: 0.4;
            filter: grayscale(0.5);
            pointer-events: none;
        }

        /* API配置区域 */
        .api-config {
            margin: 0 24px 20px 24px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
        }
        .api-config h3 {
            font-size: 1rem;
            color: #334155;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .api-config input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.95rem;
            margin-bottom: 10px;
            background: white;
        }
        .api-config .note {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 8px;
        }
        .api-config .note a {
            color: #4f46e5;
            text-decoration: none;
        }

        /* 文件上传区域 */
        .upload-area {
            margin: 0 24px 20px 24px;
            padding: 16px;
            border: 2px dashed #cbd5e1;
            border-radius: 28px;
            text-align: center;
            background: #f8fafc;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-area:hover {
            background: #f1f5f9;
        }
        .upload-area i {
            font-size: 2rem;
            color: #4f46e5;
            margin-bottom: 8px;
        }
        .upload-area p {
            color: #475569;
            font-weight: 500;
        }
        #fileInput {
            display: none;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px 8px 24px;
        }

        .history-header h2 {
            font-size: 1.25rem;
            font-weight: 590;
            color: #1e293b;
        }

        .history-header button {
            background: none;
            border: none;
            color: #4f46e5;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 30px;
            background: #f1f4f9;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .history-list {
            padding: 0 24px 30px 24px;
            max-height: 360px;
            overflow-y: auto;
            scrollbar-width: thin;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            background: #ffffff;
            border-radius: 22px;
            padding: 18px 16px;
            border: 1px solid #edf2f7;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.08);
            transition: 0.1s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: #64748b;
        }

        .history-meta i {
            width: 16px;
        }

        .history-text {
            font-size: 1rem;
            font-weight: 450;
            color: #0f172a;
            background: #f8fafc;
            padding: 14px;
            border-radius: 18px;
            line-height: 1.4;
            word-break: break-word;
            max-height: 100px;
            overflow-y: auto;
        }

        .history-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .history-actions button {
            background: transparent;
            border: none;
            color: #4b5563;
            font-size: 1.1rem;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f1f4f9;
            cursor: pointer;
            transition: 0.1s;
        }

        .history-actions button:active {
            background: #e2e8f0;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: #1e293b;
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 0.95rem;
            text-align: center;
            box-shadow: 0 20px 30px -10px black;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>
                <i class="fas fa-microphone-lines"></i> 语音转写·云API版
            </h1>
            <div class="lang-selector" id="langSelector">
                <button class="lang-option active" data-lang="zh-CN">🇨🇳 中文</button>
                <button class="lang-option" data-lang="en-US">🇬🇧 英文</button>
            </div>
        </div>

        <!-- API密钥配置 -->
        <div class="api-config">
            <h3><i class="fas fa-key"></i> 腾讯云API配置</h3>
            <input type="text" id="secretId" placeholder="SecretId" value="">
            <input type="password" id="secretKey" placeholder="SecretKey" value="">
            <div class="note">
                <i class="fas fa-info-circle"></i> 获取免费额度：<a href="https://console.cloud.tencent.com/asr" target="_blank">腾讯云语音识别</a> (每月5小时免费)
            </div>
        </div>

        <!-- 实时转写卡片 -->
        <div class="live-card">
            <div class="transcript-label"><i class="far fa-comment-dots"></i> 实时转写</div>
            <div class="live-transcript" id="liveTranscript">点击开始，对着麦克风说话...</div>
            <div class="status-badge" id="statusBadge"><i class="fas fa-circle"></i> 空闲</div>
        </div>

        <!-- 控制按钮组 -->
        <div class="control-panel">
            <button class="ctrl-btn" id="startBtn" title="开始录音"><i class="fas fa-play"></i> 开始</button>
            <button class="ctrl-btn" id="stopBtn" disabled><i class="fas fa-stop"></i> 停止</button>
        </div>

        <!-- 上传音频区域 -->
        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>点击上传音频文件进行转写</p>
            <p style="font-size:0.8rem; color:#64748b;">支持 mp3, m4a, wav, webm (使用腾讯云API)</p>
        </div>
        <input type="file" id="fileInput" accept="audio/*">

        <!-- 历史记录 -->
        <div class="history-header">
            <h2><i class="far fa-clock"></i> 本地记录</h2>
            <button id="exportAllBtn"><i class="fas fa-download"></i> 全部导出</button>
        </div>
        <div class="history-list" id="historyList">
            <div style="text-align: center; color: #94a3b8; padding: 30px 0;">暂无转写记录</div>
        </div>
    </div>

    <div id="toast" class="toast-message"></div>

    <!-- 腾讯云SDK -->
    <script src="https://cdn.jsdelivr.net/npm/tencentcloud-sdk-nodejs/tencentcloud-sdk.umd.min.js"></script>
    <script>
        (function() {
            // DOM元素
            const liveTranscriptEl = document.getElementById('liveTranscript');
            const statusBadge = document.getElementById('statusBadge');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const langSelector = document.getElementById('langSelector');
            const historyListEl = document.getElementById('historyList');
            const toastEl = document.getElementById('toast');
            const exportAllBtn = document.getElementById('exportAllBtn');
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const secretIdInput = document.getElementById('secretId');
            const secretKeyInput = document.getElementById('secretKey');

            // 全局状态
            let mediaRecorder = null;
            let audioChunks = [];
            let isRecording = false;
            let currentLanguage = 'zh-CN';
            let websocket = null;
            let currentStream = null;
            let voiceId = Date.now().toString();

            // IndexedDB
            const DB_NAME = 'VoiceTranscriptDB';
            const STORE_NAME = 'recordings';
            let db = null;

            // 腾讯云配置
            const APP_ID = '1300000000'; // 需要替换为您的实际AppId

            // 初始化数据库
            function openDB() {
                return new Promise((resolve, reject) => {
                    if (db) return resolve(db);
                    const request = indexedDB.open(DB_NAME, 3);
                    request.onerror = () => reject('数据库打开失败');
                    request.onsuccess = (e) => {
                        db = e.target.result;
                        resolve(db);
                    };
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        }
                    };
                });
            }

            async function addRecording(blob, transcript, lang, source = 'mic') {
                await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    store.add({
                        timestamp: Date.now(),
                        audioBlob: blob,
                        transcript: transcript || ' ',
                        language: lang,
                        source: source
                    }).onsuccess = () => resolve();
                });
            }

            async function getAllRecordings() {
                await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    store.getAll().onsuccess = (e) => resolve(e.target.result || []);
                });
            }

            async function deleteRecording(id) {
                await openDB();
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).delete(id);
            }

            // 渲染历史
            async function renderHistory() {
                try {
                    const records = await getAllRecordings();
                    if (records.length === 0) {
                        historyListEl.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 30px 0;">暂无转写记录</div>';
                        return;
                    }
                    records.sort((a,b) => b.timestamp - a.timestamp);
                    let html = '';
                    records.forEach(rec => {
                        const date = new Date(rec.timestamp).toLocaleString();
                        const preview = rec.transcript.length > 80 ? rec.transcript.slice(0,80)+'…' : rec.transcript;
                        html += `
                        <div class="history-item" data-id="${rec.id}">
                            <div class="history-meta">
                                <i class="far fa-calendar-alt"></i> ${date} · ${rec.language === 'zh-CN' ? '中文' : '英文'} · ${rec.source === 'mic' ? '🎤实时' : '📁上传'}
                            </div>
                            <div class="history-text">${escapeHtml(rec.transcript) || '无文本'}</div>
                            <div class="history-actions">
                                <button class="play-audio" title="播放录音"><i class="fas fa-play"></i></button>
                                <button class="export-text" title="导出文本"><i class="fas fa-file-alt"></i></button>
                                <button class="export-audio" title="导出音频"><i class="fas fa-download"></i></button>
                                <button class="delete-entry" title="删除"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>`;
                    });
                    historyListEl.innerHTML = html;

                    document.querySelectorAll('.history-item').forEach(item => {
                        const id = Number(item.dataset.id);
                        records.forEach(r => {
                            if (r.id === id) {
                                item.querySelector('.play-audio')?.addEventListener('click', () => {
                                    const url = URL.createObjectURL(r.audioBlob);
                                    new Audio(url).play();
                                });
                                item.querySelector('.export-text')?.addEventListener('click', () => {
                                    const blob = new Blob(['\uFEFF' + r.transcript], { type: 'text/plain;charset=utf-8' });
                                    const url = URL.createObjectURL(blob);
                                    const a = document.createElement('a');
                                    a.href = url;
                                    a.download = `transcript_${r.timestamp}.txt`;
                                    a.click();
                                });
                                item.querySelector('.export-audio')?.addEventListener('click', () => {
                                    const url = URL.createObjectURL(r.audioBlob);
                                    const a = document.createElement('a');
                                    a.href = url;
                                    a.download = `audio_${r.timestamp}.webm`;
                                    a.click();
                                });
                                item.querySelector('.delete-entry')?.addEventListener('click', async () => {
                                    await deleteRecording(id);
                                    renderHistory();
                                    showToast('已删除');
                                });
                            }
                        });
                    });
                } catch (e) {
                    console.error(e);
                }
            }

            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe.replace(/[&<>"]/g, m => {
                    if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
                    return m;
                });
            }

            function showToast(msg, duration = 2000) {
                toastEl.style.opacity = '1';
                toastEl.innerText = msg;
                setTimeout(() => { toastEl.style.opacity = '0'; }, duration);
            }

            // 关闭麦克风
            function closeStream() {
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                    currentStream = null;
                }
            }

            // 获取腾讯云临时签名 (实际生产环境应通过后端获取)
            async function getTempCredentials() {
                const secretId = secretIdInput.value.trim();
                const secretKey = secretKeyInput.value.trim();
                
                if (!secretId || !secretKey) {
                    throw new Error('请输入SecretId和SecretKey');
                }

                // 注意：实际生产环境中绝对不应在前端暴露SecretKey
                // 这里仅为演示，真实应用应通过后端接口获取临时凭证
                return { secretId, secretKey };
            }

            // 实时识别WebSocket
            async function startRecording() {
                if (isRecording) return;
                
                try {
                    const credentials = await getTempCredentials();
                    
                    // 请求麦克风
                    currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    // 构建WebSocket URL (腾讯云实时语音识别)
                    const wsUrl = `wss://asr.cloud.tencent.com/asr/v2/${APP_ID}?secretid=${encodeURIComponent(credentials.secretId)}&engine_model_type=16k_zh_en&voice_format=1&need_vad=1&voice_id=${voiceId}`;
                    
                    websocket = new WebSocket(wsUrl);
                    
                    websocket.onopen = () => {
                        showToast('连接成功，开始识别');
                        isRecording = true;
                        startBtn.disabled = true;
                        stopBtn.disabled = false;
                        statusBadge.innerHTML = '<i class="fas fa-circle"></i> 录音中...';
                        statusBadge.classList.add('recording');
                        
                        // 开始录制音频
                        audioChunks = [];
                        mediaRecorder = new MediaRecorder(currentStream, {
                            mimeType: 'audio/webm;codecs=opus'
                        });
                        
                        mediaRecorder.ondataavailable = (e) => {
                            if (e.data.size > 0) {
                                audioChunks.push(e.data);
                                // 发送音频数据到腾讯云
                                if (websocket && websocket.readyState === WebSocket.OPEN) {
                                    e.data.arrayBuffer().then(buffer => {
                                        websocket.send(buffer);
                                    });
                                }
                            }
                        };
                        
                        mediaRecorder.start(1000); // 每秒发送一次
                    };
                    
                    websocket.onmessage = (e) => {
                        const response = JSON.parse(e.data);
                        if (response.code === 0) {
                            if (response.final === 1) {
                                // 最终结果
                                liveTranscriptEl.innerText = response.result.text;
                                // 保存最终文本到变量
                                window.finalTranscript = response.result.text;
                            } else {
                                // 中间结果
                                liveTranscriptEl.innerText = response.result.text + '...';
                            }
                        }
                    };
                    
                    websocket.onerror = (err) => {
                        console.error('WebSocket错误:', err);
                        showToast('连接失败，请检查密钥');
                        stopRecording();
                    };
                    
                } catch (err) {
                    showToast('启动失败: ' + err.message);
                }
            }

            // 停止录音
            function stopRecording() {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
                
                if (websocket) {
                    websocket.close();
                    websocket = null;
                }
                
                closeStream();
                
                // 保存到数据库
                if (audioChunks.length > 0) {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const transcript = window.finalTranscript || '（无识别结果）';
                    addRecording(blob, transcript, currentLanguage, 'mic').then(() => {
                        renderHistory();
                    });
                }
                
                isRecording = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                statusBadge.innerHTML = '<i class="fas fa-circle"></i> 空闲';
                statusBadge.classList.remove('recording');
                
                voiceId = Date.now().toString(); // 更新voiceId
            }

            // 文件上传识别
            async function uploadAndRecognize(file) {
                try {
                    const credentials = await getTempCredentials();
                    
                    showToast('正在上传识别...');
                    
                    // 读取文件为base64
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const base64Audio = e.target.result.split(',')[1];
                        
                        // 调用腾讯云录音文件识别API
                        const response = await fetch('https://asr.tencentcloudapi.com', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'TC3-HMAC-SHA256 Credential=' + credentials.secretId + '/2026-02-24/asr/tc3_request'
                            },
                            body: JSON.stringify({
                                Action: 'CreateRecTask',
                                Version: '2019-06-14',
                                Region: 'ap-guangzhou',
                                EngineModelType: '16k_zh_en',
                                ChannelNum: 1,
                                ResTextFormat: 0,
                                SourceType: 1,
                                Data: base64Audio,
                                DataLen: file.size
                            })
                        });
                        
                        const result = await response.json();
                        if (result.Response && result.Response.Data && result.Response.Data.TaskId) {
                            // 轮询结果
                            setTimeout(() => pollResult(result.Response.Data.TaskId, file, credentials), 3000);
                        } else {
                            showToast('识别失败');
                        }
                    };
                    reader.readAsDataURL(file);
                } catch (err) {
                    showToast('上传失败: ' + err.message);
                }
            }

            async function pollResult(taskId, file, credentials) {
                try {
                    const response = await fetch('https://asr.tencentcloudapi.com', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            Action: 'DescribeTaskStatus',
                            Version: '2019-06-14',
                            Region: 'ap-guangzhou',
                            TaskId: taskId
                        })
                    });
                    
                    const result = await response.json();
                    if (result.Response && result.Response.Data && result.Response.Data.Status === 2) {
                        // 识别完成
                        const transcript = result.Response.Data.Result;
                        liveTranscriptEl.innerText = transcript;
                        
                        // 保存到数据库
                        const blob = new Blob([await file.arrayBuffer()], { type: file.type });
                        await addRecording(blob, transcript, currentLanguage, 'upload');
                        renderHistory();
                        showToast('识别完成');
                    } else if (result.Response && result.Response.Data && result.Response.Data.Status === 1) {
                        // 处理中
                        setTimeout(() => pollResult(taskId, file, credentials), 3000);
                    } else {
                        showToast('识别失败');
                    }
                } catch (err) {
                    showToast('查询失败');
                }
            }

            // 事件绑定
            startBtn.addEventListener('click', startRecording);
            stopBtn.addEventListener('click', stopRecording);

            langSelector.addEventListener('click', (e) => {
                const btn = e.target.closest('.lang-option');
                if (!btn) return;
                document.querySelectorAll('.lang-option').forEach(opt => opt.classList.remove('active'));
                btn.classList.add('active');
                currentLanguage = btn.dataset.lang;
                showToast(`语言切换为 ${currentLanguage === 'zh-CN' ? '中文' : '英文'}`);
            });

            uploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) uploadAndRecognize(e.target.files[0]);
            });

            exportAllBtn.addEventListener('click', async () => {
                const records = await getAllRecordings();
                if (records.length === 0) {
                    showToast('暂无记录');
                    return;
                }
                let content = '';
                records.sort((a,b) => a.timestamp - b.timestamp).forEach(r => {
                    content += `--- ${new Date(r.timestamp).toLocaleString()} (${r.language}) [${r.source === 'mic' ? '实时' : '上传'}] ---\n${r.transcript}\n\n`;
                });
                const blob = new Blob(['\uFEFF' + content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `全部转写_${Date.now()}.txt`;
                a.click();
            });

            // 初始化
            openDB().then(renderHistory);
        })();
    </script>
</body>
</html>
