<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>语音转写·离线专业版（文件上传+实时）</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Transformers.js 用于离线 Whisper 识别 -->
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0"></script>
    <style>
        /* 样式基本保持一致，增加上传区域 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: #1e293b;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 6px 12px rgba(0,0,0,0.05);
            overflow: hidden;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header {
            padding: 24px 24px 16px 24px;
            background: white;
            border-bottom: 1px solid #f0f2f5;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 i {
            background: #eef2ff;
            padding: 8px;
            border-radius: 18px;
            color: #4f46e5;
            font-size: 1.4rem;
            -webkit-text-fill-color: #4f46e5;
        }

        .lang-selector {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            background: #f8fafc;
            padding: 6px;
            border-radius: 48px;
            border: 1px solid #e2e8f0;
        }

        .lang-option {
            flex: 1;
            text-align: center;
            padding: 10px 6px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 40px;
            background: transparent;
            border: none;
            color: #64748b;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .lang-option.active {
            background: #ffffff;
            color: #0f172a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            font-weight: 600;
            border: 0.5px solid #d9e2ef;
        }

        .live-card {
            background: #ffffff;
            margin: 20px 24px;
            padding: 24px 20px;
            border-radius: 28px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02), 0 8px 18px -6px rgba(0,20,40,0.12);
            border: 1px solid #ffffff80;
            min-height: 160px;
            display: flex;
            flex-direction: column;
        }

        .transcript-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .transcript-label i {
            font-size: 0.9rem;
        }

        .live-transcript {
            font-size: 1.3rem;
            line-height: 1.5;
            font-weight: 420;
            color: #0b1e33;
            word-break: break-word;
            white-space: pre-wrap;
            flex: 1;
            min-height: 80px;
            max-height: 240px;
            overflow-y: auto;
            padding-right: 8px;
            scrollbar-width: thin;
        }

        .status-badge {
            align-self: flex-end;
            font-size: 0.75rem;
            padding: 6px 14px;
            background: #f1f4f9;
            border-radius: 40px;
            color: #475569;
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.recording {
            background: #fee2e2;
            color: #b91c1c;
        }

        .status-badge i {
            font-size: 0.7rem;
        }

        .control-panel {
            display: flex;
            justify-content: space-around;
            padding: 8px 24px 24px 24px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            flex: 1;
            background: #fefefe;
            border: 1px solid #e9edf2;
            border-radius: 56px;
            padding: 16px 0;
            font-size: 1rem;
            font-weight: 550;
            color: #1e293b;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            backdrop-filter: blur(2px);
        }

        .ctrl-btn:active {
            background: #f1f5f9;
            transform: scale(0.97);
        }

        .ctrl-btn.primary {
            background: #1e293b;
            border-color: #1e293b;
            color: white;
            box-shadow: 0 10px 18px -8px #1e293b80;
        }

        .ctrl-btn.primary:active {
            background: #0f172a;
        }

        .ctrl-btn:disabled {
            opacity: 0.4;
            filter: grayscale(0.5);
            pointer-events: none;
        }

        /* 文件上传区域 */
        .upload-area {
            margin: 0 24px 20px 24px;
            padding: 16px;
            border: 2px dashed #cbd5e1;
            border-radius: 28px;
            text-align: center;
            background: #f8fafc;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-area:hover {
            background: #f1f5f9;
        }
        .upload-area i {
            font-size: 2rem;
            color: #4f46e5;
            margin-bottom: 8px;
        }
        .upload-area p {
            color: #475569;
            font-weight: 500;
        }
        #fileInput {
            display: none;
        }
        .model-loading {
            font-size: 0.85rem;
            color: #2563eb;
            margin-top: 8px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px 8px 24px;
        }

        .history-header h2 {
            font-size: 1.25rem;
            font-weight: 590;
            color: #1e293b;
        }

        .history-header button {
            background: none;
            border: none;
            color: #4f46e5;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 30px;
            background: #f1f4f9;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .history-list {
            padding: 0 24px 30px 24px;
            max-height: 360px;
            overflow-y: auto;
            scrollbar-width: thin;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            background: #ffffff;
            border-radius: 22px;
            padding: 18px 16px;
            border: 1px solid #edf2f7;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.08);
            transition: 0.1s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: #64748b;
        }

        .history-meta i {
            width: 16px;
        }

        .history-text {
            font-size: 1rem;
            font-weight: 450;
            color: #0f172a;
            background: #f8fafc;
            padding: 14px;
            border-radius: 18px;
            line-height: 1.4;
            word-break: break-word;
            max-height: 100px;
            overflow-y: auto;
        }

        .history-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .history-actions button {
            background: transparent;
            border: none;
            color: #4b5563;
            font-size: 1.1rem;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f1f4f9;
            cursor: pointer;
            transition: 0.1s;
        }

        .history-actions button:active {
            background: #e2e8f0;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: #1e293b;
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 0.95rem;
            text-align: center;
            box-shadow: 0 20px 30px -10px black;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>
                <i class="fas fa-microphone-lines"></i> 语音转写·离线版
            </h1>
            <div class="lang-selector" id="langSelector">
                <button class="lang-option active" data-lang="zh-CN">🇨🇳 中文</button>
                <button class="lang-option" data-lang="en-US">🇬🇧 英文</button>
            </div>
        </div>

        <!-- 实时转写卡片 -->
        <div class="live-card">
            <div class="transcript-label"><i class="far fa-comment-dots"></i> 实时转写</div>
            <div class="live-transcript" id="liveTranscript">点击开始，对着麦克风说话...</div>
            <div class="status-badge" id="statusBadge"><i class="fas fa-circle"></i> 空闲</div>
        </div>

        <!-- 控制按钮组（实时） -->
        <div class="control-panel">
            <button class="ctrl-btn" id="startBtn" title="开始录音 (请求麦克风)"><i class="fas fa-play"></i> 开始</button>
            <button class="ctrl-btn" id="stopBtn" disabled><i class="fas fa-stop"></i> 停止</button>
        </div>

        <!-- 新增：上传音频区域（离线识别） -->
        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>点击或拖拽上传音频文件</p>
            <p style="font-size:0.8rem; color:#64748b;">支持 mp3, m4a, wav, webm 等 (离线识别，首次需下载模型)</p>
            <div id="modelStatus" class="model-loading">⚡ 模型未加载，点击上传后自动加载</div>
        </div>
        <input type="file" id="fileInput" accept="audio/*">

        <!-- 历史记录标题 & 全部导出 -->
        <div class="history-header">
            <h2><i class="far fa-clock" style="margin-right: 6px;"></i> 本地记录</h2>
            <button id="exportAllBtn"><i class="fas fa-download"></i> 全部导出</button>
        </div>

        <!-- 历史列表 动态渲染 -->
        <div class="history-list" id="historyList">
            <!-- 由js填充 -->
            <div style="text-align: center; color: #94a3b8; padding: 30px 0;">暂无转写记录</div>
        </div>
    </div>

    <!-- 轻提示toast -->
    <div id="toast" class="toast-message"></div>

    <script>
        (function() {
            // -------------------- 初始化 --------------------
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('您的浏览器不支持实时语音识别，请使用 Edge/Chrome/Safari 最新版。\n但文件上传离线识别功能仍可使用（需要 Transformers.js 支持）。');
            }

            // DOM 元素
            const liveTranscriptEl = document.getElementById('liveTranscript');
            const statusBadge = document.getElementById('statusBadge');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const langSelector = document.getElementById('langSelector');
            const historyListEl = document.getElementById('historyList');
            const toastEl = document.getElementById('toast');
            const exportAllBtn = document.getElementById('exportAllBtn');
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const modelStatus = document.getElementById('modelStatus');

            // 全局状态
            let currentStream = null;
            let mediaRecorder = null;
            let recognition = null;
            let isRecording = false;
            let userStopped = false;
            let finalTranscript = '';
            let audioChunks = [];
            let currentLanguage = 'zh-CN'; // 默认中文

            // IndexedDB
            const DB_NAME = 'VoiceTranscriptDB';
            const STORE_NAME = 'recordings';
            const DB_VERSION = 3;
            let db = null;

            // Transformers.js 相关
            let pipeline = null;
            let isModelLoading = false;

            // ---------- 初始化数据库 ----------
            function openDB() {
                return new Promise((resolve, reject) => {
                    if (db) return resolve(db);
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onerror = (e) => reject('数据库打开失败');
                    request.onsuccess = (e) => {
                        db = e.target.result;
                        resolve(db);
                    };
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                            store.createIndex('timestamp', 'timestamp', { unique: false });
                            store.createIndex('language', 'language', { unique: false });
                        }
                    };
                });
            }

            async function addRecording(blob, transcript, lang, source = 'mic') {
                await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const entry = {
                        timestamp: Date.now(),
                        audioBlob: blob,
                        transcript: transcript || ' ',
                        language: lang,
                        source: source // 记录来源：mic 或 upload
                    };
                    const req = store.add(entry);
                    req.onsuccess = () => resolve();
                    req.onerror = (e) => reject(e);
                });
            }

            async function getAllRecordings() {
                await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const req = store.getAll();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = (e) => reject(e);
                });
            }

            async function deleteRecording(id) {
                await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const req = store.delete(id);
                    req.onsuccess = () => resolve();
                    req.onerror = (e) => reject(e);
                });
            }

            // ---------- 渲染历史列表 ----------
            async function renderHistory() {
                try {
                    const records = await getAllRecordings();
                    if (records.length === 0) {
                        historyListEl.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 30px 0;">暂无转写记录</div>';
                        return;
                    }
                    records.sort((a,b) => b.timestamp - a.timestamp);
                    let html = '';
                    records.forEach(rec => {
                        const date = new Date(rec.timestamp).toLocaleString(undefined, { hour12: false, hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
                        const preview = rec.transcript.length > 80 ? rec.transcript.slice(0,80)+'…' : rec.transcript;
                        html += `
                        <div class="history-item" data-id="${rec.id}">
                            <div class="history-meta">
                                <i class="far fa-calendar-alt"></i> ${date}  ·  ${rec.language === 'zh-CN' ? '中文' : '英文'} · ${rec.source === 'mic' ? '🎤实时' : '📁上传'}
                            </div>
                            <div class="history-text">${escapeHtml(rec.transcript) || '无文本'}</div>
                            <div class="history-actions">
                                <button class="play-audio" title="播放录音"><i class="fas fa-play"></i></button>
                                <button class="export-text" title="导出文本"><i class="fas fa-file-alt"></i></button>
                                <button class="export-audio" title="导出音频"><i class="fas fa-download"></i></button>
                                <button class="delete-entry" title="删除"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>`;
                    });
                    historyListEl.innerHTML = html;

                    document.querySelectorAll('.history-item').forEach(item => {
                        const id = Number(item.dataset.id);
                        const record = records.find(r => r.id === id);

                        item.querySelector('.play-audio')?.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (record?.audioBlob) {
                                const url = URL.createObjectURL(record.audioBlob);
                                const audio = new Audio(url);
                                audio.play().catch(e => showToast('播放失败：' + e.message));
                                setTimeout(() => URL.revokeObjectURL(url), 10000);
                            } else {
                                showToast('无音频数据');
                            }
                        });

                        item.querySelector('.export-text')?.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (record?.transcript) {
                                // 添加 BOM 解决乱码
                                const blob = new Blob(['\uFEFF' + record.transcript], { type: 'text/plain;charset=utf-8' });
                                const url = URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.href = url;
                                a.download = `transcript_${record.timestamp}.txt`;
                                a.click();
                                URL.revokeObjectURL(url);
                                showToast('文本已导出');
                            } else {
                                showToast('无文本内容');
                            }
                        });

                        item.querySelector('.export-audio')?.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (record?.audioBlob) {
                                const url = URL.createObjectURL(record.audioBlob);
                                const a = document.createElement('a');
                                a.href = url;
                                a.download = `audio_${record.timestamp}.webm`;
                                a.click();
                                URL.revokeObjectURL(url);
                                showToast('音频已导出');
                            } else {
                                showToast('无音频数据');
                            }
                        });

                        item.querySelector('.delete-entry')?.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            await deleteRecording(id);
                            renderHistory();
                            showToast('已删除');
                        });
                    });
                } catch (e) {
                    console.error(e);
                }
            }

            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
                    return m;
                });
            }

            function showToast(msg, duration = 2000) {
                toastEl.style.opacity = '1';
                toastEl.innerText = msg;
                setTimeout(() => { toastEl.style.opacity = '0'; }, duration);
            }

            // ---------- 实时录音相关（与之前相同，略作优化）----------
            function closeStream() {
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                    currentStream = null;
                }
            }

            async function saveToDBAndCleanup() {
                try {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const transcript = finalTranscript.trim() || '（无语音识别文本）';
                    await addRecording(blob, transcript, currentLanguage, 'mic');
                    showToast('已保存到本地记录');
                } catch (e) {
                    console.warn('保存失败', e);
                    showToast('保存失败');
                } finally {
                    closeStream();
                    isRecording = false;
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    statusBadge.innerHTML = '<i class="fas fa-circle"></i> 空闲';
                    statusBadge.classList.remove('recording');
                    liveTranscriptEl.innerText = '点击开始，对着麦克风说话...';
                    renderHistory();
                }
            }

            function stopRecording() {
                if (!isRecording) return;
                userStopped = true;
                if (recognition) {
                    try { recognition.stop(); } catch (e) {}
                }
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
            }

            async function startRecording() {
                if (isRecording) return;
                finalTranscript = '';
                audioChunks = [];
                userStopped = false;

                try {
                    currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } catch (err) {
                    showToast('无法访问麦克风: ' + err.message);
                    return;
                }

                if (SpeechRecognition) {
                    try {
                        recognition = new SpeechRecognition();
                        recognition.continuous = true;
                        recognition.interimResults = true;
                        recognition.lang = currentLanguage;
                        recognition.onresult = (event) => {
                            let final = '';
                            let interim = '';
                            for (let i = 0; i < event.results.length; i++) {
                                if (event.results[i].isFinal) {
                                    final += event.results[i][0].transcript;
                                } else {
                                    interim += event.results[i][0].transcript;
                                }
                            }
                            finalTranscript = final;
                            liveTranscriptEl.innerText = final + interim || '（聆听中...）';
                        };
                        recognition.onerror = (e) => {
                            console.warn('识别错误:', e.error);
                            if (!userStopped && isRecording) {
                                setTimeout(() => {
                                    if (!userStopped && isRecording && recognition) {
                                        try { recognition.start(); } catch (err) {}
                                    }
                                }, 500);
                            }
                        };
                        recognition.onend = () => {
                            if (!userStopped && isRecording) {
                                setTimeout(() => {
                                    if (!userStopped && isRecording && recognition) {
                                        try { recognition.start(); } catch (err) {}
                                    }
                                }, 300);
                            }
                        };
                    } catch (e) {
                        showToast('语音识别初始化失败');
                        recognition = null;
                    }
                } else {
                    recognition = null;
                }

                try {
                    mediaRecorder = new MediaRecorder(currentStream, {
                        mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
                    });
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) audioChunks.push(e.data);
                    };
                    mediaRecorder.onstop = saveToDBAndCleanup;
                    mediaRecorder.start(200);
                } catch (e) {
                    showToast('媒体录制初始化失败');
                    closeStream();
                    return;
                }

                if (recognition) {
                    try { recognition.start(); } catch (e) {
                        showToast('识别启动失败');
                        mediaRecorder.stop();
                        return;
                    }
                }

                isRecording = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusBadge.innerHTML = '<i class="fas fa-circle"></i> 录音中...';
                statusBadge.classList.add('recording');
                liveTranscriptEl.innerText = '正在聆听...';
            }

            // ---------- 文件上传离线识别 (Transformers.js Whisper) ----------
            async function loadWhisperPipeline() {
                if (pipeline) return pipeline;
                if (isModelLoading) {
                    showToast('模型正在加载中，请稍后...');
                    return null;
                }
                isModelLoading = true;
                modelStatus.innerText = '⏳ 正在下载/加载模型（首次需下载约150MB，请耐心等待）...';
                try {
                    // 使用 Transformers.js 的 pipeline，选择小型模型 tiny 或 base，兼顾速度和准确性
                    // 这里使用 'Xenova/whisper-tiny' 多语言版，支持中文和英文
                    pipeline = await pipelineFactory('automatic-speech-recognition', 'Xenova/whisper-tiny');
                    modelStatus.innerText = '✅ 模型已就绪，可上传音频';
                    showToast('模型加载完成，现在可以离线识别');
                } catch (e) {
                    console.error(e);
                    modelStatus.innerText = '❌ 模型加载失败，请刷新重试';
                    showToast('模型加载失败');
                } finally {
                    isModelLoading = false;
                }
                return pipeline;
            }

            // 由于 Transformers.js 的 pipeline 是异步工厂，我们需要从全局获取
            // 注意：上面的 pipelineFactory 实际上是 transformers 的 pipeline 函数
            // 我们直接用全局 pipelines
            const { pipeline: transformersPipeline } = self?.transformers?.pipeline ? self.transformers : { pipeline: null };
            async function getPipeline() {
                if (!transformersPipeline) {
                    showToast('Transformers.js 加载异常');
                    return null;
                }
                return await loadWhisperPipeline();
            }

            // 处理文件上传
            uploadArea.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 检查模型是否可用，若未加载则先加载
                const pipe = await getPipeline();
                if (!pipe) {
                    showToast('模型未就绪，请稍后重试');
                    return;
                }

                showToast('正在识别，请稍候...');
                modelStatus.innerText = '🔍 识别中...';

                try {
                    // 读取文件为 ArrayBuffer
                    const arrayBuffer = await file.arrayBuffer();
                    // 使用 AudioContext 解码音频数据（支持大多数格式）
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));

                    // 获取音频数据（单声道，16kHz 采样率） Whisper 期望 16000 Hz mono
                    const targetSampleRate = 16000;
                    const offlineCtx = new OfflineAudioContext(1, audioBuffer.length * targetSampleRate / audioBuffer.sampleRate, targetSampleRate);
                    const source = offlineCtx.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(offlineCtx.destination);
                    source.start();
                    const renderedBuffer = await offlineCtx.startRendering();
                    const audioData = renderedBuffer.getChannelData(0); // Float32Array

                    // 调用 Whisper 进行识别
                    const language = currentLanguage === 'zh-CN' ? 'zh' : 'en';
                    const result = await pipe(audioData, { language, task: 'transcribe' });
                    const transcript = result.text;

                    // 将原始文件 Blob 保存到 IndexedDB（作为音频记录）
                    const originalBlob = new Blob([arrayBuffer], { type: file.type });
                    await addRecording(originalBlob, transcript, currentLanguage, 'upload');

                    // 更新实时显示
                    liveTranscriptEl.innerText = transcript;
                    showToast('识别完成，已保存');
                    renderHistory();
                } catch (err) {
                    console.error(err);
                    showToast('识别失败：' + err.message);
                } finally {
                    modelStatus.innerText = '✅ 模型已就绪，可继续上传';
                    fileInput.value = ''; // 清空以便重新选择
                }
            });

            // ---------- 事件绑定 ----------
            startBtn.addEventListener('click', startRecording);
            stopBtn.addEventListener('click', stopRecording);

            langSelector.addEventListener('click', (e) => {
                const btn = e.target.closest('.lang-option');
                if (!btn) return;
                const lang = btn.dataset.lang;
                if (!lang) return;
                document.querySelectorAll('.lang-option').forEach(opt => opt.classList.remove('active'));
                btn.classList.add('active');
                currentLanguage = lang;
                showToast(`语言切换为 ${lang === 'zh-CN' ? '中文' : '英文'}`);
            });

            exportAllBtn.addEventListener('click', async () => {
                try {
                    const records = await getAllRecordings();
                    if (records.length === 0) {
                        showToast('暂无记录');
                        return;
                    }
                    let content = '';
                    records.sort((a,b) => a.timestamp - b.timestamp).forEach(r => {
                        const date = new Date(r.timestamp).toLocaleString();
                        content += `--- ${date} (${r.language}) [${r.source === 'mic' ? '实时' : '上传'}] ---\n${r.transcript}\n\n`;
                    });
                    const blob = new Blob(['\uFEFF' + content], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `全部转写_${Date.now()}.txt`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('全部文本已导出');
                } catch (e) {
                    showToast('导出失败');
                }
            });

            // 初始化数据库并渲染历史
            openDB().then(() => {
                renderHistory();
            }).catch(e => {
                console.error(e);
                showToast('IndexedDB初始化失败，存储将不可用');
            });

            // 预加载模型（可选，提升用户体验）
            // 延迟加载，避免影响页面启动速度
            setTimeout(() => {
                if (transformersPipeline) {
                    // 不阻塞，静默加载
                    getPipeline().catch(() => {});
                }
            }, 2000);
        })();
    </script>
</body>
</html>
